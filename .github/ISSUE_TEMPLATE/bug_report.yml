name: Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. This is a **public** tracker — please redact sensitive data from screenshots and logs before attaching them.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown on the About or Settings page (web) or in-app About screen (mobile).
      placeholder: e.g. 2.4.1
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Paste or drag screenshots and recordings directly into this field.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant errors or logs
      description: Error messages shown on screen or in the browser console. Formatted as code automatically.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this has not been reported yet.
          required: true
        - label: I removed all sensitive data (names, emails, financial data, tokens) from screenshots and logs.
          required: true
